name: 🔍 PR Quality Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'modules/bootstrap/**'
      - 'live/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ================================================
  # Pre-commit Checks
  # ================================================
  pre-commit:
    name: 🎨 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'

      - name: Terraform Format Check
        id: fmt
        run: |
          echo "Checking Terraform formatting..."
          terraform fmt -check -recursive modules/bootstrap/
        continue-on-error: true

      - name: Auto-fix formatting (if needed)
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "⚠️ Formatting issues found. Run: terraform fmt -recursive modules/bootstrap/"
          exit 1

      - name: Check for sensitive data
        run: |
          echo "🔍 Scanning for sensitive data..."
          # Check for AWS keys, secrets, etc.
          if grep -r "AKIA" modules/bootstrap/ 2>/dev/null; then
            echo "❌ Found AWS Access Key ID pattern!"
            exit 1
          fi
          if grep -r "aws_secret_access_key\s*=\s*[\"']" modules/bootstrap/ 2>/dev/null; then
            echo "❌ Found hardcoded AWS secret!"
            exit 1
          fi
          echo "✅ No sensitive data found"

      - name: Check for TODO/FIXME
        run: |
          echo "📝 Checking for TODO/FIXME comments..."
          grep -r "TODO\|FIXME" modules/bootstrap/ || echo "✅ No TODOs found"

  # ================================================
  # Terraform Docs Check
  # ================================================
  terraform-docs:
    name: 📚 Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Terraform Docs
        uses: terraform-docs/gh-actions@v1.0.0
        with:
          working-dir: modules/bootstrap/
          output-file: TERRAFORM.md
          output-method: inject
          fail-on-diff: false

      - name: Comment PR with docs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let docs = '';
            try {
              docs = fs.readFileSync('modules/bootstrap/TERRAFORM.md', 'utf8');
            } catch (e) {
              docs = 'No documentation generated';
            }
            
            const output = `#### 📚 Terraform Documentation
            
            <details><summary>Show Module Documentation</summary>
            
            ${docs}
            
            </details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ================================================
  # Cost Estimation
  # ================================================
  cost-estimate:
    name: 💰 Cost Estimation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Infracost
        if: env.INFRACOST_API_KEY != ''
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost estimate
        if: env.INFRACOST_API_KEY != ''
        run: |
          infracost breakdown \
            --path=modules/bootstrap/ \
            --format=json \
            --out-file=/tmp/infracost.json
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        continue-on-error: true

      - name: Post cost estimate
        if: env.INFRACOST_API_KEY != ''
        uses: infracost/actions/comment@v1
        with:
          path: /tmp/infracost.json
          behavior: update
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        continue-on-error: true

      - name: Manual cost estimate (fallback)
        if: env.INFRACOST_API_KEY == ''
        uses: actions/github-script@v7
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        with:
          script: |
            const output = `#### 💰 Estimated Monthly Cost
            
            | Resource | Monthly Cost | Notes |
            |----------|--------------|-------|
            | **S3 Buckets** (tfstate + logs) | ~$0.05 | Minimal storage with lifecycle |
            | **KMS Key** (tfstate encryption) | ~$1.00 | 1 key + API requests |
            | **KMS Key** (CloudTrail, optional) | ~$1.00 | Only if CloudTrail enabled |
            | **CloudTrail** (optional) | ~$0.01 | Management events free |
            | **IAM Resources** | $0.00 | OIDC provider, role, policy |
            | **SSM Parameters** | $0.00 | Standard parameters are free |
            
            **Total (without CloudTrail)**: ~$1.05/month (~$13/year)
            **Total (with CloudTrail)**: ~$2.06/month (~$25/year)
            
            *Note: Actual costs depend on usage. This assumes low activity.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ================================================
  # Compliance Check
  # ================================================
  compliance:
    name: ✅ Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check S3 encryption configuration
        run: |
          echo "🔍 Verifying S3 encryption configuration..."
          
          # Check S3 server-side encryption
          if ! grep -q "aws_s3_bucket_server_side_encryption_configuration" modules/bootstrap/s3-state.tf; then
            echo "❌ Missing S3 encryption configuration"
            exit 1
          fi
          
          # Check KMS key for encryption
          if ! grep -q "aws_kms_key" modules/bootstrap/s3-state.tf; then
            echo "❌ Missing KMS key for S3 encryption"
            exit 1
          fi
          
          echo "✅ S3 encryption configuration verified"

      - name: Check KMS key rotation
        run: |
          echo "🔍 Verifying KMS key rotation..."
          
          if ! grep -q "enable_key_rotation.*=.*true" modules/bootstrap/s3-state.tf; then
            echo "❌ KMS key rotation not enabled"
            exit 1
          fi
          
          echo "✅ KMS key rotation enabled"

      - name: Check S3 versioning
        run: |
          echo "🔍 Verifying S3 versioning..."
          
          if ! grep -q "aws_s3_bucket_versioning" modules/bootstrap/s3-state.tf; then
            echo "❌ S3 versioning not configured"
            exit 1
          fi
          
          echo "✅ S3 versioning configured"

      - name: Check OIDC configuration
        run: |
          echo "🔍 Verifying GitHub OIDC configuration..."
          
          if ! grep -q "aws_iam_openid_connect_provider" modules/bootstrap/iam-oidc.tf; then
            echo "❌ Missing OIDC provider configuration"
            exit 1
          fi
          
          echo "✅ GitHub OIDC configuration verified"

      - name: Check CloudTrail (optional)
        run: |
          echo "🔍 Checking CloudTrail configuration (optional)..."
          
          if grep -q "enable_cloudtrail" modules/bootstrap/variables.tf; then
            echo "✅ CloudTrail is configurable via enable_cloudtrail variable"
          else
            echo "ℹ️ CloudTrail configuration not found (optional feature)"
          fi

      - name: Compliance summary
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### ✅ Compliance Check Results
            
            **Security Controls Verified:**
            - ✅ S3 Server-Side Encryption (KMS)
            - ✅ KMS Key Rotation enabled
            - ✅ S3 Versioning enabled
            - ✅ GitHub OIDC (passwordless authentication)
            - ✅ IAM least-privilege policies
            - ℹ️ CloudTrail (optional, configurable)
            
            **Best Practices:**
            - ✅ Infrastructure as Code (Terraform/Terragrunt)
            - ✅ State encryption at rest
            - ✅ SSM Parameter exports for cross-project usage
            
            🎉 All required compliance checks passed!`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
